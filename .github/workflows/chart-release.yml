name: Release Helm Chart

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Needed to push gh-pages branch + create GitHub Release
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # chart-releaser needs full history to compute changes

      - name: Configure Git
        run: |
          git config user.name "sureops-bot"
          git config user.email "bot@sureops.ai"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint charts/sureops

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          config: cr.yaml
          skip_existing: true   # Idempotent: re-runs against an existing release skip the upload step
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
