name: Stale issues

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"

          stale-issue-message: |
            👋 This issue has been quiet for 30 days. We're marking it as `stale` to keep the tracker tidy.

            **If this is still relevant**, just leave a comment (any comment — even just "still relevant") and we'll remove the `stale` label and pick it back up.

            **If you're not sure anymore**, no action needed — we'll close it in 14 days, but you can reopen it any time with a new comment.

            Thanks for filing it in the first place 💛

          stale-pr-message: |
            This PR has been quiet for 30 days. Marking as `stale` — leave a comment to keep it open. Otherwise we'll close in 14 days; feel free to reopen any time.

          close-issue-message: |
            Closing as `stale` after 14 days of inactivity. **This isn't a judgment** — we close to keep the tracker scannable. Reopen any time by leaving a comment.

          close-pr-message: |
            Closing as `stale` after 14 days. Reopen any time.

          exempt-issue-labels: "pinned,priority:p0,priority:p1,status:in-progress,customer-reported"
          exempt-pr-labels: "pinned,status:in-progress"

          # Keep the stale-bot polite — don't process more than 50 issues/day
          operations-per-run: 50
          remove-stale-when-updated: true
          ascending: true   # Process oldest first
