name: 💡 Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["type:feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 💡 Vote on existing requests first
        Browse [open feature requests sorted by 👍 reactions](https://github.com/sureops/sureops-public/issues?q=is%3Aissue+is%3Aopen+label%3Atype%3Afeature+sort%3Areactions-%2B1-desc) — your reaction is a stronger signal than another duplicate. If you see your idea, add a 👍 and a comment about your specific use case.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user / customer / operational problem — not the proposed solution.
      placeholder: Today, when an incident pages me at 3am, I have to manually copy the diagnosis into Slack so my team can react before they're awake. I want sureops to post that automatically.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal behavior look like? Sketches / mockups welcome.
      placeholder: A per-incident toggle "Auto-post diagnosis to Slack channel #incidents", configurable per-environment.
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - "Blocking my beta usage — I can't ship without this"
        - "This quarter — I have a workaround but it hurts"
        - "Nice-to-have — quality of life"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Which component would this touch?
      options:
        - agents
        - incident-flow
        - problem-management
        - dashboard
        - byok
        - comms
        - helm
        - auth
        - api
        - docs
        - other / cross-cutting
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround (if any)
      description: How are you handling this today?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches you've thought about? Why those don't fit?
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing feature requests and reacted to any duplicates.
          required: true
