{{/*
Secret template — creates the Secret resource that deployments reference.

IMPORTANT: You MUST create this secret before installing the chart.
The chart will fail if secrets are not provided.

Create the secret manually:
  kubectl create secret generic RELEASE-NAME-sureops-secret \
    --from-literal=db-password=YOUR_DB_PASSWORD \
    --from-literal=anthropic-api-key=YOUR_ANTHROPIC_KEY \
    --from-literal=encryption-master-key=YOUR_ENCRYPTION_KEY \
    --from-literal=langchain-api-key=YOUR_LANGSMITH_KEY \
    --from-literal=oidc-client-secret=YOUR_OIDC_SECRET \
    --from-literal=license-key=YOUR_LICENSE_KEY

Or use External Secrets Operator / Sealed Secrets for production.

Set secrets.externalManaged=true in values.yaml to skip this template
and manage the Secret entirely out-of-band.
*/}}
{{- if not .Values.secrets.externalManaged }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sureops.fullname" . }}-secret
  labels:
    {{- include "sureops.labels" . | nindent 4 }}
  annotations:
    description: >-
      sureops secrets. Populate via kubectl create secret, External Secrets Operator,
      or Sealed Secrets. Do not store actual values in version control.
type: Opaque
{{- end }}
